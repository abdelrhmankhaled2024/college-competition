<div class="container-fluid nav-container">
  <nav class="navbar container">

    <div class="navbar-left">
      <div class="logo" (click)="navigateTo('home')">
        <i class="fa fa-rocket"></i>
        TechNova
      </div>

      <div class="menu-links">
        <span (click)="navigateTo('home')">Home</span>
        <span (click)="navigateTo('competitions')">Competitions</span>
        <span (click)="navigateTo('winners')">Past Winners</span>
        <span (click)="navigateTo('about')">About</span>
      </div>
    </div>

    @if (!isLoggedIn) {
      <div class="navbar-right">
        <button type="button" class="btn btn-outline-light me-2" (click)="navigateTo('login')">
          <i class="bi bi-box-arrow-in-right"></i> Login
        </button>
        <button type="button" class="btn btn-light" (click)="navigateTo('register')">
          <i class="bi bi-person-fill-add"></i> Register
        </button>
      </div>
    } @else {
<div class="dropdown">
  <button class="btn btn-outline-light me-2 dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
    <i class="bi bi-person-circle"></i> {{ currentUser?.email }}
  </button>
  <ul class="dropdown-menu">
    <li class="dropdown-item" style="cursor: pointer;" (click)="navigateTo('dashboard')">
      <i class="bi bi-speedometer2"></i> Dashboard
    </li>
    <li class="dropdown-item" style="cursor: pointer;" (click)="navigateTo('profile')">
      <i class="bi bi-person"></i> My Profile
    </li>
    <li class="dropdown-item" style="cursor: pointer;" (click)="navigateTo('projects')">
      <i class="bi bi-briefcase"></i> My Projects
    </li>
    <li class="dropdown-item" style="cursor: pointer;" (click)="logout()">
      <i class="bi bi-box-arrow-right"></i> Logout
    </li>
  </ul>
</div>
    }

  </nav>
</div>
